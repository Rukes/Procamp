services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: procamp
      POSTGRES_USER: procamp
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procamp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://procamp:${DB_PASSWORD}@db:5432/procamp
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      HCAPTCHA_SECRET: ${HCAPTCHA_SECRET}
      SYSTEM_SMTP_HOST: ${SYSTEM_SMTP_HOST}
      SYSTEM_SMTP_PORT: ${SYSTEM_SMTP_PORT}
      SYSTEM_SMTP_USER: ${SYSTEM_SMTP_USER}
      SYSTEM_SMTP_PASS: ${SYSTEM_SMTP_PASS}
      SYSTEM_SMTP_FROM: ${SYSTEM_SMTP_FROM}
    ports:
      - "3001:3001"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_FORM_BASE_URL: ${VITE_FORM_BASE_URL}
        VITE_HCAPTCHA_SITE_KEY: ${VITE_HCAPTCHA_SITE_KEY}
        VITE_COMMIT_HASH: ${VITE_COMMIT_HASH:-unknown}
    restart: unless-stopped
    ports:
      - "3000:80"

  form:
    build:
      context: .
      dockerfile: apps/form/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_HCAPTCHA_SITE_KEY: ${VITE_HCAPTCHA_SITE_KEY}
        VITE_GA_ID: ${VITE_GA_ID:-}
    restart: unless-stopped
    ports:
      - "3002:80"

volumes:
  db_data:
